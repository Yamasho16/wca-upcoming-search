name: Sync WCA Competitions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SYNC_BASE_URL: ${{ secrets.SYNC_BASE_URL }}
      SYNC_API_SECRET: ${{ secrets.SYNC_API_SECRET }}
      MAX_PAGES: "80"
      CHUNK_SIZE: "5"
    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SYNC_BASE_URL}"
          test -n "${SYNC_API_SECRET}"

      - name: Sync paginated upcoming competitions
        shell: bash
        run: |
          set -euo pipefail

          request_with_retry() {
            local url="$1"
            local attempts=4
            local delay=5
            local try=1

            while true; do
              if response="$(curl --silent --show-error --fail-with-body \
                -X POST \
                -H "x-sync-secret: ${SYNC_API_SECRET}" \
                "$url")"; then
                printf '%s' "$response"
                return 0
              fi

              if [ "$try" -ge "$attempts" ]; then
                echo "Request failed after ${attempts} attempts: ${url}" >&2
                return 1
              fi

              echo "Request failed for ${url}. Retrying in ${delay}s... (${try}/${attempts})" >&2
              sleep "$delay"
              try=$((try + 1))
              delay=$((delay * 2))
            done
          }

          page=1
          offset=0
          pages_processed=0
          last_page=1
          last_offset=0

          while true; do
            echo "Syncing page ${page} offset ${offset}"

            response="$(request_with_retry "${SYNC_BASE_URL}/api/admin/sync?page=${page}&offset=${offset}&chunkSize=${CHUNK_SIZE}")"
            echo "$response"

            has_next_chunk="$(printf '%s' "$response" | python -c "import sys, json; print(str(json.load(sys.stdin).get('hasNextChunk', False)).lower())")"
            next_offset="$(printf '%s' "$response" | python -c "import sys, json; print(json.load(sys.stdin).get('nextOffset') or '')")"
            has_next="$(printf '%s' "$response" | python -c "import sys, json; print(str(json.load(sys.stdin).get('hasNextPage', False)).lower())")"
            next_page="$(printf '%s' "$response" | python -c "import sys, json; print(json.load(sys.stdin).get('nextPage') or '')")"

            pages_processed=$((pages_processed + 1))
            last_page="${page}"
            last_offset="${offset}"

            if [ "$has_next_chunk" = "true" ]; then
              if [ -z "$next_offset" ]; then
                echo "hasNextChunk=true but nextOffset missing" >&2
                exit 1
              fi
              offset="$next_offset"
              continue
            fi

            if [ "$has_next" != "true" ]; then
              break
            fi

            if [ "$pages_processed" -ge "$MAX_PAGES" ]; then
              echo "Reached MAX_PAGES=${MAX_PAGES} before completion" >&2
              exit 1
            fi

            if [ -z "$next_page" ]; then
              echo "hasNextPage=true but nextPage missing" >&2
              exit 1
            fi

            page="$next_page"
            offset=0
          done

          echo "Finalizing after page ${last_page}"
          request_with_retry "${SYNC_BASE_URL}/api/admin/sync?page=${last_page}&offset=${last_offset}&chunkSize=${CHUNK_SIZE}&finalize=1&finalizeOnly=1"
